# =============================================================================
# CROSS-LANGUAGE PARITY TABLE
# =============================================================================
# Single source of truth for Python ↔ TypeScript API parity. Consumed by:
#
#   * python/tests/test_parity.py   — asserts every row exists on both sides
#   * TS test in ts/tests/parity.test.ts (via JSON mirror) — same, from TS
#   * docs autogen (future): renders this table into CLAUDE.md / README
#
# When you add a new operator or cross-language method, add a row here *first*.
# CI will fail until the corresponding Python operator and TS method both
# exist — that's the whole point of this file.

[meta]
schema_version = 1
description = "Python operators ↔ TypeScript method names parity map"

# -----------------------------------------------------------------------------
# BUILDER-LEVEL COMPOSITION OPERATORS
# -----------------------------------------------------------------------------
# Each row: a single composition primitive that must exist on BuilderBase in
# both languages. ``python_operator`` is the dunder name (``__rshift__``, …);
# ``python_example`` shows the operator form; ``ts_method`` is the camelCase
# method name on the TS BuilderBase.

[[operators]]
name = "sequential"
python_operator = "__rshift__"
python_example  = "a >> b"
ts_method       = "then"
ts_example      = "a.then(b)"
returns         = "Pipeline"
description     = "Run a, then run b. Left-associative; flattens into a single Pipeline."

[[operators]]
name = "parallel"
python_operator = "__or__"
python_example  = "a | b"
ts_method       = "parallel"
ts_example      = "a.parallel(b)"
returns         = "FanOut"
description     = "Run a and b concurrently. Left-associative; flattens into a single FanOut."

[[operators]]
name = "loop"
python_operator = "__mul__"
python_example  = "a * 3"
ts_method       = "times"
ts_example      = "a.times(3)"
returns         = "Loop"
description     = "Repeat the workflow N times. Integer argument = fixed iterations."

[[operators]]
name = "loop_until"
python_operator = "__mul__"
python_example  = "a * until(pred, max=5)"
ts_method       = "timesUntil"
ts_example      = "a.timesUntil(pred, { max: 5 })"
returns         = "Loop"
description     = "Repeat until predicate is true (bounded by ``max``)."

[[operators]]
name = "fallback"
python_operator = "__floordiv__"
python_example  = "a // b"
ts_method       = "fallback"
ts_example      = "a.fallback(b)"
returns         = "Fallback"
description     = "Try a; if a raises, try b. Chain further with repeated ``//`` / ``.fallback``."

[[operators]]
name = "structured_output"
python_operator = "__matmul__"
python_example  = "a @ Schema"
ts_method       = "outputAs"
ts_example      = "a.outputAs(Schema)"
returns         = "Agent"
description     = "Constrain LLM response to a Pydantic/Zod schema. Runtime enforces JSON shape."

# -----------------------------------------------------------------------------
# NAMESPACE COMPOSITE ATTACHMENT
# -----------------------------------------------------------------------------
# Python: ``Composite >> Builder`` dispatches via ``__rshift__`` to the
# builder's setter. TS has no operator overloading, so composites expose
# ``.attachTo(builder)`` that calls the same setter. The *setter* method is
# identical in both languages (same name, same semantics).

[[composites]]
namespace       = "C"
python_form     = "C.window(5) >> agent"
ts_form         = "C.window(5).attachTo(agent)"
target_method   = "context"

[[composites]]
namespace       = "P"
python_form     = "P.role('analyst') >> agent"
ts_form         = "P.role('analyst').attachTo(agent)"
target_method   = "instruct"

[[composites]]
namespace       = "T"
python_form     = "T.fn(search) >> agent"
ts_form         = "T.fn(search).attachTo(agent)"
target_method   = "tools"

[[composites]]
namespace       = "G"
python_form     = "G.length(max=500) >> agent"
ts_form         = "G.length({ max: 500 }).attachTo(agent)"
target_method   = "guard"

[[composites]]
namespace       = "M"
python_form     = "M.retry() >> agent"
ts_form         = "M.retry().attachTo(agent)"
target_method   = "middleware"

[[composites]]
namespace       = "A"
python_form     = "A.publish('out.json') >> agent"
ts_form         = "A.publish('out.json').attachTo(agent)"
target_method   = "artifacts"

# -----------------------------------------------------------------------------
# CANONICAL COMPOSITION VERBS (per-namespace)
# -----------------------------------------------------------------------------
# Python overloads ``|`` and ``>>`` on each namespace composite. TS has no
# operator overloading, so it uses a named method. Both languages MUST agree
# on the method name so docs, examples, and user intuition translate. Each
# row pins the canonical method names for a namespace's two operators:
#
#   * ``union_method``  — what ``|`` resolves to (union / combine). Empty
#                         string if the namespace has no ``|`` semantics
#                         (e.g. T, G, M, A chain via ``pipe_method`` only).
#   * ``pipe_method``   — what ``>>`` resolves to (pipe / chain). Every
#                         composite supports this.
#
# CI enforces that the named method exists on both PyTransform and TsTransform
# with matching semantics. Picking a different verb in one language is a bug.
#
#   Python       TS             Namespace
#   -------      -------        ---------
#   S: a | b  →  a.combine(b)   state (value merging)
#   C: a | b  →  a.union(b)     context (set union, suppression wins)
#   P: a | b  →  a.union(b)     prompt (section set union)
#   T: a | b  →  a.pipe(b)      tool (chain — no union semantics)
#   G: a | b  →  a.pipe(b)      guard (chain — no union semantics)
#   M: a | b  →  a.pipe(b)      middleware (chain — no union semantics)
#   A: (n/a)                    artifact (chain via >> only)
#
# Every namespace resolves ``>>`` to ``.pipe(b)`` in TS regardless of the
# union verb — pipe is the universal chain verb.

[[canonical_verbs]]
namespace       = "S"
union_method    = "combine"
pipe_method     = "pipe"
notes           = "Both inputs see the original state; deltas are merged key-wise."

[[canonical_verbs]]
namespace       = "C"
union_method    = "union"
pipe_method     = "pipe"
notes           = "Set-union of history filters; suppression wins (if either suppresses, composite does)."

[[canonical_verbs]]
namespace       = "P"
union_method    = "union"
pipe_method     = "pipe"
notes           = "Section set union; section order stays canonical (role → context → task → constraint → format → example)."

[[canonical_verbs]]
namespace       = "T"
union_method    = ""
pipe_method     = "pipe"
notes           = "Tool composites chain only; no union operator."

[[canonical_verbs]]
namespace       = "G"
union_method    = ""
pipe_method     = "pipe"
notes           = "Guard composites chain only; no union operator."

[[canonical_verbs]]
namespace       = "M"
union_method    = ""
pipe_method     = "pipe"
notes           = "Middleware composites chain only; no union operator."

[[canonical_verbs]]
namespace       = "A"
union_method    = ""
pipe_method     = "pipe"
notes           = "Artifact composites chain via >>/.pipe(); no union operator."

# -----------------------------------------------------------------------------
# NAMED-WORD ALIASES (top-level package exports)
# -----------------------------------------------------------------------------
# Python has every named alias (State, Context, Prompt, Guard, Middleware,
# Tool, Artifact, Eval, Reactive, Harness, Ui). TS has all of them EXCEPT
# ``State`` — the name is already taken by an exported type alias
# ``Record<string, unknown>``. This is intentional, tracked here so CI
# doesn't fight it.

[[aliases]]
python_name     = "State"
short           = "S"
ts_name         = ""            # intentionally blank — use S directly in TS
reason          = "TS exports ``type State = Record<string, unknown>``; alias would collide."

[[aliases]]
python_name     = "Context"
short           = "C"
ts_name         = "Context"
reason          = ""

