# Generated files are owned by `just generate` — not by pre-commit.
# Golden files are generator output snapshots — also excluded.
# The exclude pattern below keeps formatters from touching generated output.
exclude: |
  (?x)^(
    src/adk_fluent/(agent|config|executor|planner|plugin|runtime|service|tool|workflow)\.(py|pyi)$|
    src/adk_fluent/_ir_generated\.py$|
    tests/generated/|
    tests/golden/|
    docs/generated/
  )

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
