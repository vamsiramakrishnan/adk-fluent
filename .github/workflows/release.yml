name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Release orchestrator. Thin dispatcher over two reusable workflows:
#
#   _publish-python.yml  — builds + publishes the Python package
#   _publish-npm.yml     — builds + publishes the TypeScript package
#
# Both reusable workflows have the same shape: build → inspect → publish.
# This file just picks the target(s) and feeds them the canonical version.
#
# Triggers
# --------
# - Tag push (v*): production release to PyPI + npm.
# - workflow_dispatch: picks a subset for dry-run / backfill.
#
#   Dispatch targets:
#     all           → PyPI + npm            (what a tag push does)
#     dry-run       → TestPyPI + npm pack   (end-to-end rehearsal, no prod writes)
#     pypi          → PyPI only
#     testpypi      → TestPyPI only
#     npm           → npm only
#     npm-dry-run   → npm pack only
#
# Secrets
# -------
# - PyPI: Trusted Publishing (`id-token: write` + project on pypi.org + testpypi.org).
# - npm:  NPM_TOKEN attached to the GitHub environment named `npm`.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: Publishing target
        required: true
        default: dry-run
        type: choice
        options:
          - all
          - dry-run
          - pypi
          - testpypi
          - npm
          - npm-dry-run

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─── stage 1: resolve what to do ────────────────────────────────────────
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      version:        ${{ steps.resolve.outputs.version }}
      publish-pypi:   ${{ steps.resolve.outputs.publish-pypi }}
      publish-testpypi: ${{ steps.resolve.outputs.publish-testpypi }}
      publish-npm:    ${{ steps.resolve.outputs.publish-npm }}
      publish-npm-dry: ${{ steps.resolve.outputs.publish-npm-dry }}
      create-release: ${{ steps.resolve.outputs.create-release }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release plan
        id: resolve
        run: |
          set -euo pipefail

          VERSION=$(python3 -m shared.scripts.release version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG" != "$VERSION" ]; then
              echo "::error::Tag v$TAG does not match VERSION file ($VERSION). Run: just rel-sync"
              exit 1
            fi
            TARGET="all"
          else
            TARGET="${{ github.event.inputs.target }}"
          fi

          echo "Release target: $TARGET (version $VERSION)"

          want_pypi=false
          want_testpypi=false
          want_npm=false
          want_npm_dry=false
          want_release=false

          case "$TARGET" in
            all)         want_pypi=true; want_npm=true;       want_release=true ;;
            dry-run)     want_testpypi=true; want_npm_dry=true ;;
            pypi)        want_pypi=true ;;
            testpypi)    want_testpypi=true ;;
            npm)         want_npm=true ;;
            npm-dry-run) want_npm_dry=true ;;
            *) echo "::error::unknown target: $TARGET"; exit 1 ;;
          esac

          echo "publish-pypi=$want_pypi"         >> "$GITHUB_OUTPUT"
          echo "publish-testpypi=$want_testpypi" >> "$GITHUB_OUTPUT"
          echo "publish-npm=$want_npm"           >> "$GITHUB_OUTPUT"
          echo "publish-npm-dry=$want_npm_dry"   >> "$GITHUB_OUTPUT"
          echo "create-release=$want_release"    >> "$GITHUB_OUTPUT"

      - name: Preflight (strict)
        run: python3 -m shared.scripts.release preflight --strict

  # ─── stage 2a: python publish path ──────────────────────────────────────
  python-pypi:
    needs: [plan]
    if: needs.plan.outputs.publish-pypi == 'true'
    uses: ./.github/workflows/_publish-python.yml
    with:
      version: ${{ needs.plan.outputs.version }}
      target: pypi
      run-preflight: true

  python-testpypi:
    needs: [plan]
    if: needs.plan.outputs.publish-testpypi == 'true'
    uses: ./.github/workflows/_publish-python.yml
    with:
      version: ${{ needs.plan.outputs.version }}
      target: testpypi
      run-preflight: true

  # ─── stage 2b: npm publish path ─────────────────────────────────────────
  ts-npm:
    needs: [plan]
    if: needs.plan.outputs.publish-npm == 'true'
    uses: ./.github/workflows/_publish-npm.yml
    secrets: inherit
    with:
      version: ${{ needs.plan.outputs.version }}
      target: npm
      run-preflight: true

  ts-npm-dry:
    needs: [plan]
    if: needs.plan.outputs.publish-npm-dry == 'true'
    uses: ./.github/workflows/_publish-npm.yml
    with:
      version: ${{ needs.plan.outputs.version }}
      target: npm-dry-run
      run-preflight: true

  # ─── stage 3: publish release artifacts (tag push only) ─────────────────
  github-release:
    needs: [plan, python-pypi, ts-npm]
    if: needs.plan.outputs.create-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.plan.outputs.version }}
          path: release-assets/python/

      - uses: actions/download-artifact@v4
        with:
          name: ts-dist-${{ needs.plan.outputs.version }}
          path: release-assets/ts/

      - name: Collect artifacts
        run: |
          mkdir -p upload
          cp release-assets/python/*.whl release-assets/python/*.tar.gz upload/
          cp release-assets/ts/dist-pack/*.tgz upload/
          ls -la upload/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.plan.outputs.version }}
          name: v${{ needs.plan.outputs.version }}
          generate_release_notes: true
          files: upload/*
          fail_on_unmatched_files: true
