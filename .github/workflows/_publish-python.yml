name: Build · Python

# ─────────────────────────────────────────────────────────────────────────────
# Reusable: builds the Python package and uploads the artifact.
#
# Publishing is handled inline in release.yml so that PyPI Trusted Publishing
# sees `job_workflow_ref: release.yml` (reusable workflows are NOT officially
# supported by PyPI Trusted Publishing).
#
# Inputs:
#   version       — expected semver string; build fails if python/_version.py differs
#   target        — "pypi" (prod) | "testpypi" (dry run) — passed through for naming
#   run-preflight — gate the job on `python -m shared.scripts.release preflight --strict`
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      target:
        required: true
        type: string
        description: "pypi | testpypi"
      run-preflight:
        required: false
        type: boolean
        default: true

env:
  UV_VERSION: "0.8.17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          uv-version: ${{ env.UV_VERSION }}

      - name: Preflight (strict)
        if: inputs.run-preflight
        run: uv run --project python python -m shared.scripts.release preflight --strict

      - name: Assert version matches input
        run: |
          ACTUAL=$(uv run --project python python -m shared.scripts.release version)
          if [ "$ACTUAL" != "${{ inputs.version }}" ]; then
            echo "::error::VERSION is $ACTUAL but workflow expects ${{ inputs.version }}"
            exit 1
          fi

      - name: Generate code
        run: just scan seed generate

      - name: Build wheel + sdist
        working-directory: python
        run: uv build

      - name: Inspect artifacts
        working-directory: python
        run: |
          ls -la dist/
          uv run --no-project --with twine twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: python-dist-${{ inputs.version }}
          path: python/dist/
          retention-days: 30
