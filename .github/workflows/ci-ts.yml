name: CI — TypeScript

on:
  push:
    branches: [master]
    paths:
      - "ts/**"
      - ".github/workflows/ci-ts.yml"
  pull_request:
    branches: [master]
    paths:
      - "ts/**"
      - ".github/workflows/ci-ts.yml"
  workflow_dispatch:

concurrency:
  group: ci-ts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Install dependencies
        working-directory: ts
        run: npm ci

      - name: Type check
        working-directory: ts
        run: npm run typecheck

      - name: Lint
        working-directory: ts
        run: npm run lint

      - name: Build
        working-directory: ts
        run: npm run build

      - name: Test
        working-directory: ts
        run: npm test

      - name: Generate API docs (typedoc)
        working-directory: ts
        run: npm run docs
