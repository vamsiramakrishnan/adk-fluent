name: Build · npm

# ─────────────────────────────────────────────────────────────────────────────
# Reusable: builds the TypeScript package and uploads the artifact.
#
# Publishing is handled inline in release.yml so that npm provenance sees the
# correct workflow ref and secrets are inherited cleanly.
#
# Inputs:
#   version        — expected semver; build fails if ts/package.json differs
#   target         — "npm" (prod) | "npm-dry-run" (pack only) — passed through
#   run-preflight  — gate on `python -m shared.scripts.release preflight --strict`
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      target:
        required: true
        type: string
        description: "npm | npm-dry-run"
      run-preflight:
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Preflight (strict)
        if: inputs.run-preflight
        run: python3 -m shared.scripts.release preflight --strict

      - name: Assert version matches input
        run: |
          ACTUAL=$(python3 -m shared.scripts.release version)
          if [ "$ACTUAL" != "${{ inputs.version }}" ]; then
            echo "::error::VERSION is $ACTUAL but workflow expects ${{ inputs.version }}"
            exit 1
          fi

      - name: Install + build
        working-directory: ts
        run: |
          npm ci
          npm run build

      - name: Stage LICENSE in ts/
        run: cp LICENSE ts/LICENSE

      - name: Inspect tarball contents (dry-run)
        working-directory: ts
        run: |
          npm pack --dry-run 2>&1 | tee pack-listing.txt
          grep -q 'dist/index.js' pack-listing.txt  || { echo "::error::tarball missing dist/index.js"; exit 1; }
          grep -q 'LICENSE'        pack-listing.txt  || { echo "::error::tarball missing LICENSE"; exit 1; }

      - name: Pack tarball
        working-directory: ts
        run: |
          mkdir -p dist-pack
          npm pack --pack-destination dist-pack

      - uses: actions/upload-artifact@v7
        with:
          name: ts-dist-${{ inputs.version }}
          path: |
            ts/dist/
            ts/dist-pack/
            ts/LICENSE
          retention-days: 30
