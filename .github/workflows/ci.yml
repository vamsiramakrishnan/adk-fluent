name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Unified CI pipeline for the adk-fluent monorepo (Python + TypeScript).
#
# Stages:
#
#   1. detect       — paths-filter; computes which packages need work
#   2. quick-checks — lint + format + typecheck (parallel, fast feedback)
#   3. codegen      — verifies generated files match the generator (idempotency)
#   4. test         — Python matrix (3.11/3.12/3.13) + TS matrix (Node 20/22)
#   5. compat       — N-5 ADK backward-compatibility matrix (Python only)
#   6. build        — produces wheel/sdist + npm dist artifacts
#   7. ci-passed    — single required gate; PRs branch-protect on this name
#
# Release publishing is handled by a separate workflow (release.yml) that
# runs only on tags.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.8.17"
  ADK_VERSION: "1.25.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── stage 1: detect changes ────────────────────────────────────────────
  detect:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ts: ${{ steps.filter.outputs.ts }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'python/**'
              - 'shared/**'
              - 'pyproject.toml'
            ts:
              - 'ts/**'
              - 'shared/scripts/code_ir/ts_emitter.py'
              - 'shared/scripts/generator/**'
            shared:
              - 'shared/**'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'justfile'

  # ─── stage 2a: python quick checks ──────────────────────────────────────
  python-lint:
    name: python · lint
    needs: detect
    if: needs.detect.outputs.python == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    env:
      # TS hooks are owned by the dedicated ts-lint job (npm run lint /
      # format:check). Skipping them here keeps python-lint from depending on
      # the ts/ workspace and prevents TS-only failures from blocking Python
      # changes.
      SKIP: ts-eslint,ts-prettier
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Run pre-commit hooks (Python + universal hygiene)
        run: uv run --project python pre-commit run --all-files --show-diff-on-failure

  python-typecheck:
    name: python · typecheck
    needs: detect
    if: needs.detect.outputs.python == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Generate code and stubs
        run: just scan seed generate
      - name: Pyright on generated stubs
        run: just typecheck
      - name: Pyright on hand-written code
        run: just typecheck-core

  # ─── stage 2b: ts quick checks ──────────────────────────────────────────
  ts-lint:
    name: ts · lint
    needs: detect
    if: needs.detect.outputs.ts == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ts-env
      - name: ESLint (--max-warnings 0)
        working-directory: ts
        run: npm run lint
      - name: Prettier (format check)
        working-directory: ts
        run: npm run format:check

  ts-typecheck:
    name: ts · typecheck
    needs: detect
    if: needs.detect.outputs.ts == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ts-env
      - name: tsc --noEmit
        working-directory: ts
        run: npm run typecheck

  # ─── stage 3: codegen idempotency ───────────────────────────────────────
  codegen-verify:
    name: codegen · idempotency
    needs: detect
    if: needs.detect.outputs.shared == 'true' || needs.detect.outputs.python == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Verify Python generated files are up-to-date
        run: just check-gen
      - name: Verify skill freshness
        run: just check-skills

  # ─── stage 4a: python tests ─────────────────────────────────────────────
  python-test:
    name: python · test (${{ matrix.python-version }})
    needs: [python-lint, python-typecheck, codegen-verify]
    if: needs.detect.outputs.python == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          uv-version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
      - name: Generate code
        run: just scan seed generate
      - name: Run unit tests with coverage
        working-directory: python
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src/adk_fluent \
            --cov-report=xml \
            --cov-report=term-missing \
            --ignore=tests/test_code_ir.py \
            --ignore=tests/test_doc_generator.py \
            --ignore=tests/test_seed_generator.py \
            --ignore=tests/test_generator_golden.py
      - name: Run codegen pipeline tests (from repo root)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd python && uv run pytest \
            tests/test_code_ir.py \
            tests/test_seed_generator.py \
            tests/test_generator_golden.py \
            -v --tb=short || true
      - name: Run cookbook smoke tests
        working-directory: python
        run: uv run pytest examples/cookbook/ -q --tb=short
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          file: python/coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── stage 4b: ts tests ─────────────────────────────────────────────────
  ts-test:
    name: ts · test (Node ${{ matrix.node-version }})
    needs: [ts-lint, ts-typecheck]
    if: needs.detect.outputs.ts == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ts-env
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build
        working-directory: ts
        run: npm run build
      - name: Vitest
        working-directory: ts
        run: npm test

  # ─── stage 5: python N-5 compat matrix ──────────────────────────────────
  python-compat:
    name: compat · ADK ${{ matrix.adk-version }}
    needs: python-test
    if: needs.detect.outputs.python == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adk-version:
          - "1.27.1"
          - "1.26.0"
          - "1.25.1"
          - "1.24.1"
          - "1.23.0"
          - "1.22.1"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Generate code with latest ADK
        run: just scan seed generate
      - name: Downgrade google-adk
        working-directory: python
        run: uv pip install "google-adk==${{ matrix.adk-version }}"
      - name: Run unit tests
        working-directory: python
        run: |
          uv run pytest tests/ -v --tb=short -x \
            --ignore=tests/test_code_ir.py \
            --ignore=tests/test_doc_generator.py \
            --ignore=tests/test_seed_generator.py \
            --ignore=tests/test_generator_golden.py
      - name: Run cookbook smoke tests
        working-directory: python
        run: uv run pytest examples/cookbook/ -q --tb=short

  # ─── stage 6a: python build ─────────────────────────────────────────────
  python-build:
    name: python · build
    needs: python-test
    if: needs.detect.outputs.python == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          uv-version: ${{ env.UV_VERSION }}
      - name: Generate code
        run: just scan seed generate
      - name: Build wheel + sdist
        working-directory: python
        run: uv build
      - name: Smoke-test wheel install
        working-directory: python
        run: |
          uv venv ${{ runner.temp }}/smoke-venv
          VIRTUAL_ENV=${{ runner.temp }}/smoke-venv uv pip install dist/*.whl
          ${{ runner.temp }}/smoke-venv/bin/python -c "
          from adk_fluent import Agent, Pipeline, FanOut, Loop
          from adk_fluent._version import __version__
          a = Agent('smoke-test').instruct('hello')
          print(f'Smoke test passed: adk-fluent v{__version__}')
          "
      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: python/dist/
          retention-days: 7

  # ─── stage 6b: ts build ─────────────────────────────────────────────────
  ts-build:
    name: ts · build
    needs: ts-test
    if: needs.detect.outputs.ts == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ts-env
      - name: Build dist/
        working-directory: ts
        run: npm run build
      - name: Generate API docs (typedoc)
        working-directory: ts
        run: npm run docs
      - uses: actions/upload-artifact@v7
        with:
          name: ts-dist
          path: |
            ts/dist/
            ts/docs/
          retention-days: 7

  # ─── stage 7: aggregate gate (the only required check) ─────────────────
  ci-passed:
    name: CI Passed
    needs:
      - detect
      - python-lint
      - python-typecheck
      - python-test
      - python-compat
      - python-build
      - ts-lint
      - ts-typecheck
      - ts-test
      - ts-build
      - codegen-verify
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          echo "::group::Job results"
          echo "$NEEDS_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          rows = []
          for name, info in sorted(data.items()):
              result = info.get('result', 'skipped')
              rows.append((name, result))
          width = max(len(n) for n, _ in rows)
          for n, r in rows:
              icon = {'success':'✓','skipped':'·','failure':'✗','cancelled':'⊘'}.get(r,'?')
              print(f'  {icon}  {n.ljust(width)}  {r}')
          failed = [n for n, r in rows if r == 'failure']
          if failed:
              print()
              print(f'::error::CI failed in: {', '.join(failed)}')
              sys.exit(1)
          print()
          print('All jobs passed or were skipped.')
          "
          echo "::endgroup::"

      - name: Write summary
        if: always()
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          {
            echo "## CI Pipeline Summary"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "$NEEDS_JSON" | python3 -c "
          import json, sys
          for name, info in sorted(json.load(sys.stdin).items()):
              r = info.get('result', 'skipped')
              icon = {'success':'✅','skipped':'⏭️','failure':'❌','cancelled':'🚫'}.get(r,'❓')
              print(f'| \`{name}\` | {icon} {r} |')
          "
          } >> "$GITHUB_STEP_SUMMARY"
