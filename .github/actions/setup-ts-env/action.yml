name: Setup TypeScript environment
description: |
  Composite action that installs Node + caches npm and runs `npm ci` inside
  ts/. Reusable across all TypeScript jobs.

inputs:
  node-version:
    description: Node version (e.g. "20", "22")
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: ts/package-lock.json

    - name: Install TypeScript dependencies
      shell: bash
      working-directory: ts
      run: npm ci
