name: Setup adk-fluent environment
description: Checkout, install uv + just + dependencies. Reusable composite action.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: ""
  uv-version:
    description: uv version to install
    required: false
    default: "0.8.17"

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: ${{ inputs.uv-version }}
        python-version: ${{ inputs.python-version || '' }}

    - uses: taiki-e/install-action@just

    - name: Install dependencies
      shell: bash
      run: uv sync --all-extras
